name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            binary: unfault
            platform: linux-x86_64

          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            binary: unfault
            platform: linux-arm64

          - target: x86_64-apple-darwin
            runner: macos-15-intel
            binary: unfault
            platform: macos-x86_64

          - target: aarch64-apple-darwin
            runner: macos-15
            binary: unfault
            platform: macos-arm64

          - target: x86_64-pc-windows-msvc
            runner: windows-2025
            binary: unfault.exe
            platform: windows-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p unfault

      - name: Set asset name
        shell: bash
        run: |
          VERSION=${{ github.ref_name }}
          PLATFORM=${{ matrix.platform }}
          if [ "${{ runner.os }}" = "Windows" ]; then
            echo "ASSET=unfault-${VERSION}-${PLATFORM}.exe" >> "$GITHUB_ENV"
          else
            echo "ASSET=unfault-${VERSION}-${PLATFORM}" >> "$GITHUB_ENV"
          fi

      - name: Stage binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} "${{ env.ASSET }}"
          chmod +x "${{ env.ASSET }}"
          shasum -a 256 "${{ env.ASSET }}" > "${{ env.ASSET }}.sha256"
          # Also produce a stable `latest` name so README curl URLs never change
          LATEST="${{ env.ASSET }}"
          LATEST="${LATEST/${{ github.ref_name }}/latest}"
          cp "${{ env.ASSET }}" "$LATEST"
          shasum -a 256 "$LATEST" > "$LATEST.sha256"

      - name: Stage binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target\${{ matrix.target }}\release\${{ matrix.binary }}" "${{ env.ASSET }}"
          $hash = (Get-FileHash "${{ env.ASSET }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ env.ASSET }}" | Out-File -Encoding ascii "${{ env.ASSET }}.sha256"
          # Also produce a stable `latest` name
          $latest = "${{ env.ASSET }}" -replace [regex]::Escape("${{ github.ref_name }}"), "latest"
          Copy-Item "${{ env.ASSET }}" "$latest"
          $hash2 = (Get-FileHash "$latest" -Algorithm SHA256).Hash.ToLower()
          "$hash2  $latest" | Out-File -Encoding ascii "$latest.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: unfault-*
          if-no-files-found: error

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-24.04
    environment: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      # Crates must be published in dependency order.
      # Each sleep gives the registry time to index before the next crate
      # tries to resolve it as a dependency.
      - name: Publish unfault-core
        run: cargo publish -p unfault-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for unfault-core to be indexed
        run: sleep 30

      - name: Publish unfault-analysis
        run: cargo publish -p unfault-analysis
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for unfault-analysis to be indexed
        run: sleep 30

      - name: Publish unfault
        run: cargo publish -p unfault
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    environment: release
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: artifacts/unfault-*
